services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-resume-generatorgithubio-jekyll:local
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
    command: bundle exec jekyll serve --watch --force_polling --host 0.0.0.0 --port 4000
