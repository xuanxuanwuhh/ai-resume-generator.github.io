name: Deploy Jekyll site to GitHub Pages
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: github-pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - name: Build Jekyll site
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            baseurl=""
          else
            baseurl="/$repo_name"
          fi
          echo "PAGES_BASEURL=$baseurl" >> "$GITHUB_ENV"
          JEKYLL_ENV=production bundle exec jekyll build --baseurl "$baseurl"
      - name: Build Flutter web
        shell: bash
        run: |
          cd flutter-version
          flutter pub get
          flutter build web --release --base-href "${PAGES_BASEURL}/flutter-version/"
      - name: Merge Flutter web into Pages artifact
        shell: bash
        run: |
          mkdir -p "_site/flutter-version"
          cp -R flutter-version/build/web/. "_site/flutter-version/"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
